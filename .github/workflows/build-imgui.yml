name: Build imgui Android AArch64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ant openjdk-17-jdk

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Copy ImGui headers
        run: |
          cp include/imgui/*.h imgui-binding/src/main/native/ || true
          cp include/implot/*.h imgui-binding/src/main/native/ || true
          cp include/imnodes/*.h imgui-binding/src/main/native/ || true

      - name: Create build dirs
        run: |
          mkdir -p imgui-binding/build/tmp/linux64
          mkdir -p imgui-binding/build/obj/linux64
          mkdir -p imgui-binding/build/libsNative/linux64

      - name: Patch build xml
        run: |
          cd imgui-binding/build/jni

          sed -i 's#<property name="cCompiler" value="gcc"/>#<property name="cCompiler" value="aarch64-linux-android21-clang"/>#' build-linux64.xml
          sed -i 's#<property name="cppCompiler" value="g++"/>#<property name="cppCompiler" value="aarch64-linux-android21-clang++"/>#' build-linux64.xml

      - name: Export NDK
        run: |
          echo "/opt/hostedtoolcache/ndk/r27c/x64/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Generate Java JNI headers
        run: |
          chmod +x ./gradlew
          ./gradlew :imgui-binding:compileJava

      - name: Verify generated JNI headers
        run: |
          ls -la imgui-binding/build/generated/sources/headers/java/main
          test -f imgui-binding/build/generated/sources/headers/java/main/imgui_ImDrawData.h

      - name: Build
        working-directory: imgui-binding/build/jni
        run: ant clean all

      - name: Check output
        run: |
          file imgui-binding/build/libsNative/linux64/libimgui-java64.so || true
          readelf -h imgui-binding/build/libsNative/linux64/libimgui-java64.so || true

      - uses: actions/upload-artifact@v4
        with:
          name: libimgui-java64-android-aarch64
          path: imgui-binding/build/libsNative/linux64/libimgui-java64.so
