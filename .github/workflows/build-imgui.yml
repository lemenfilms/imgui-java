name: Build imgui Android AArch64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y ant openjdk-17-jdk

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Debug NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"

          find / -name aarch64-linux-android21-clang 2>/dev/null | head -20

          find / -name aarch64-linux-android21-clang++ 2>/dev/null | head -20

      - name: Stop here
        run: exit 1
